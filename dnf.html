<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DNF - 地下城与勇士</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #080316; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        canvas { display: block; max-width: 100%; border: 2px solid #6a40a0; box-shadow: 0 0 40px rgba(100,60,200,0.7); cursor: default; }
        #back-btn { position: absolute; top: 14px; left: 14px; background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.25); color: #fff; padding: 7px 16px; border-radius: 8px; cursor: pointer; font-size: 13px; backdrop-filter: blur(6px); }
        #back-btn:hover { background: rgba(255,255,255,0.22); }
    </style>
</head>
<body>
<button id="back-btn" onclick="history.back()">← 返回</button>
<canvas id="game" width="800" height="450"></canvas>
<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const W = 800, H = 450, GY = H - 80;

// ---- Input ----
const keys = {};
document.addEventListener('keydown', e => {
    const prev = keys[e.code];
    keys[e.code] = true;
    e.preventDefault();
    if (e.code === 'Tab' && !prev) toggleSkillTree();
});
document.addEventListener('keyup', e => { keys[e.code] = false; });

// ---- Mouse ----
let mouseX = 0, mouseY = 0;
canvas.addEventListener('mousemove', e => {
    const r = canvas.getBoundingClientRect();
    mouseX = (e.clientX - r.left) * (W / r.width);
    mouseY = (e.clientY - r.top) * (H / r.height);
});
canvas.addEventListener('click', e => {
    const r = canvas.getBoundingClientRect();
    handleSkillTreeClick((e.clientX - r.left) * (W / r.width), (e.clientY - r.top) * (H / r.height));
});

// ---- Helpers ----
function rand(a, b) { return a + Math.random() * (b - a); }
function rectsOverlap(a, b) { return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }
function hexRgb(hex) {
    const r = /^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec(hex);
    return r ? `${parseInt(r[1],16)},${parseInt(r[2],16)},${parseInt(r[3],16)}` : '128,128,128';
}

// ---- Game State ----
let score = 0, wave = 1, maxWave = 1, gameState = 'play';
let enemies = [], projectiles = [];

// ---- Effects ----
const effects = [];
function addSpark(x, y, n = 8, hue = 30) {
    for (let i = 0; i < n; i++) {
        const a = rand(0, Math.PI*2), s = rand(2, 6);
        effects.push({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-2,
            life:rand(12,22), maxLife:22, color:`hsl(${hue+rand(-15,15)},100%,${rand(60,80)}%)`, size:rand(2,5) });
    }
}
function addNum(x, y, text, color = '#ffff00') {
    effects.push({ type:'num', x, y, vy:-1.6, life:50, maxLife:50, text, color });
}
function addBurst(x, y, hue = 200, n = 20) {
    for (let i = 0; i < n; i++) {
        const a = (i/n)*Math.PI*2, s = rand(4,9);
        effects.push({ type:'spark', x, y, vx:Math.cos(a)*s, vy:Math.sin(a)*s-3,
            life:40, maxLife:40, color:`hsl(${hue+rand(-20,20)},100%,70%)`, size:rand(4,8) });
    }
}
function updateEffects() {
    for (let i = effects.length-1; i >= 0; i--) {
        const e = effects[i];
        if (--e.life <= 0) { effects.splice(i, 1); continue; }
        if (e.type === 'spark') { e.x += e.vx; e.y += e.vy; e.vy += 0.3; e.vx *= 0.94; }
        else { e.y += e.vy; }
    }
}
function drawEffects() {
    effects.forEach(e => {
        const a = e.life / e.maxLife;
        ctx.save(); ctx.globalAlpha = a;
        if (e.type === 'spark') {
            ctx.fillStyle = e.color;
            ctx.beginPath(); ctx.arc(e.x, e.y, e.size*a, 0, Math.PI*2); ctx.fill();
        } else {
            ctx.font = 'bold 16px sans-serif'; ctx.textAlign = 'center';
            ctx.strokeStyle = '#000'; ctx.lineWidth = 3; ctx.fillStyle = e.color;
            ctx.strokeText(e.text, e.x, e.y); ctx.fillText(e.text, e.x, e.y);
        }
        ctx.restore();
    });
}

// ---- Projectile ----
class Projectile {
    constructor(x, y, vx, color) {
        this.x = x; this.y = y; this.vx = vx; this.w = 70; this.h = 10;
        this.dmg = Math.floor(rand(35, 55)); this.color = color;
        this.hitSet = new Set(); this.life = 100;
    }
    update() {
        this.x += this.vx; this.life--;
        enemies.forEach(e => {
            if (e.dead || this.hitSet.has(e)) return;
            if (rectsOverlap({x:this.x-this.w/2,y:this.y-this.h/2,w:this.w,h:this.h}, {x:e.x,y:e.y-e.h,w:e.w,h:e.h})) {
                e.takeDamage(this.dmg); addNum(e.x+e.w/2, e.y-e.h-10, this.dmg, '#88ffff');
                addSpark(e.x+e.w/2, e.y-e.h/2, 8, 190); this.hitSet.add(e);
                player.combo++; player.comboTimer = 150;
            }
        });
    }
    draw() {
        const a = Math.min(1, this.life/20); ctx.save(); ctx.globalAlpha = a;
        ctx.shadowColor = this.color; ctx.shadowBlur = 14; ctx.fillStyle = this.color;
        ctx.fillRect(this.x-this.w/2, this.y-this.h/2, this.w, this.h);
        ctx.fillStyle = '#fff'; ctx.fillRect(this.x-this.w/2, this.y-2, this.w, 4);
        ctx.restore();
    }
    get dead() { return this.life <= 0 || this.x < -100 || this.x > W+100; }
}

// ---- Skill Definitions ----
const SKILLS = [
    { id:'whirlwind', name:'旋风斩', icon:'🌀', desc:'全屏范围伤害', mpCost:30, maxCd:200, unlockWave:1, color:'#00ccff',
      execute(p) {
          addBurst(p.x+p.w/2, p.y-p.h/2, 200);
          let hits = 0;
          enemies.forEach(e => {
              if (e.dead) return;
              const d = Math.floor(rand(60,90));
              e.takeDamage(d); addNum(e.x+e.w/2, e.y-e.h-10, d, '#00ffff');
              addSpark(e.x+e.w/2, e.y-e.h/2, 12, 200); hits++;
          });
          if (hits) { p.combo += hits; p.comboTimer = 150; }
      }
    },
    { id:'dash', name:'冲刺斩', icon:'💨', desc:'向前冲刺击穿敌人', mpCost:20, maxCd:120, unlockWave:1, color:'#ffaa00',
      execute(p) {
          const dir = p.facing, dist = 220;
          const tx = Math.max(0, Math.min(W-p.w, p.x + dir*dist));
          const box = { x:dir>0?p.x:tx, y:p.y-p.h, w:Math.abs(tx-p.x)+p.w, h:p.h };
          for (let i = 0; i < 8; i++) addSpark(p.x+p.w/2 - dir*i*20, p.y-p.h/2, 3, 40);
          p.x = tx;
          enemies.forEach(e => {
              if (e.dead) return;
              if (rectsOverlap(box, {x:e.x,y:e.y-e.h,w:e.w,h:e.h})) {
                  const d = Math.floor(rand(40,60));
                  e.takeDamage(d); addNum(e.x+e.w/2, e.y-e.h-10, d, '#ffaa00');
                  addSpark(e.x+e.w/2, e.y-e.h/2, 10, 40); p.combo++; p.comboTimer = 150;
              }
          });
      }
    },
    { id:'quake', name:'天崩', icon:'🌍', desc:'地面冲击波伤近处', mpCost:25, maxCd:180, unlockWave:2, color:'#aaff00',
      execute(p) {
          const cx = p.x+p.w/2;
          addBurst(cx, p.y, 80);
          enemies.forEach(e => {
              if (e.dead) return;
              const dist = Math.abs((e.x+e.w/2) - cx);
              if (dist < 200) {
                  const d = Math.floor(rand(40,65) * (1 - dist/400));
                  e.takeDamage(d); addNum(e.x+e.w/2, e.y-e.h-10, d, '#aaff00');
                  addSpark(e.x+e.w/2, e.y-e.h/2, 10, 90); p.combo++; p.comboTimer = 150;
              }
          });
      }
    },
    { id:'bloodblade', name:'血刃', icon:'🗡️', desc:'重击锁定最近敌人', mpCost:40, maxCd:250, unlockWave:2, color:'#ff4466',
      execute(p) {
          addBurst(p.x+p.w/2, p.y-p.h/2, 330);
          const tgt = enemies.filter(e=>!e.dead).sort((a,b) =>
              Math.abs(a.x+a.w/2-p.x-p.w/2) - Math.abs(b.x+b.w/2-p.x-p.w/2))[0];
          if (tgt) {
              const d = Math.floor(rand(110,160));
              tgt.takeDamage(d); addNum(tgt.x+tgt.w/2, tgt.y-tgt.h-15, d, '#ff4466');
              addSpark(tgt.x+tgt.w/2, tgt.y-tgt.h/2, 20, 330); p.combo += 3; p.comboTimer = 180;
          }
      }
    },
    { id:'chain', name:'闪电链', icon:'⚡', desc:'闪电连锁多个敌人', mpCost:35, maxCd:160, unlockWave:3, color:'#ffff44',
      execute(p) {
          const targets = enemies.filter(e=>!e.dead).slice(0, 4);
          targets.forEach((e, i) => {
              setTimeout(() => {
                  if (e.dead) return;
                  const d = Math.floor(rand(45,70));
                  e.takeDamage(d); addNum(e.x+e.w/2, e.y-e.h-10, d, '#ffff44');
                  addSpark(e.x+e.w/2, e.y-e.h/2, 8, 60); p.combo++; p.comboTimer = 150;
              }, i * 120);
          });
      }
    },
    { id:'swordwave', name:'剑气波', icon:'〰️', desc:'发射剑气横扫全场', mpCost:25, maxCd:140, unlockWave:3, color:'#88ffff',
      execute(p) { projectiles.push(new Projectile(p.x+p.w/2, p.y-p.h/2, p.facing*10, '#88ffff')); }
    },
    { id:'holylight', name:'圣光术', icon:'✨', desc:'回复30点HP', mpCost:50, maxCd:300, unlockWave:5, color:'#ffffaa',
      execute(p) {
          const heal = Math.min(30, p.maxHp - p.hp);
          p.hp += heal;
          addBurst(p.x+p.w/2, p.y-p.h/2, 55, 12);
          addNum(p.x+p.w/2, p.y-p.h-20, `+${heal}HP`, '#ffffaa');
      }
    },
    { id:'berserk', name:'狂暴', icon:'💢', desc:'10秒攻击力+80%', mpCost:45, maxCd:400, unlockWave:5, color:'#ff8800',
      execute(p) { p.berserkTimer = 600; addBurst(p.x+p.w/2, p.y-p.h/2, 20); }
    },
];

// ---- Skill Equip State ----
// 4 slots for U I O L keys
let equippedSkills = ['whirlwind', 'dash', null, null];
let slotCDs = [0, 0, 0, 0];
const SLOT_KEYS = ['KeyU', 'KeyI', 'KeyO', 'KeyL'];
const SLOT_LABELS = ['U', 'I', 'O', 'L'];

function getSkill(id) { return SKILLS.find(s => s.id === id) || null; }
function isUnlocked(sk) { return maxWave >= sk.unlockWave; }

// ---- Skill Tree UI ----
let skillTreeOpen = false;
let selectedId = null;

// Layout (absolute canvas coords)
const ST = { ox:40, oy:30, ow:720, oh:390, cw:140, ch:70, gap:14, perRow:4, sx:64, sy:100, slx:64, sly:282, slw:158, slh:74 };

function skillRect(i) {
    return { x: ST.sx + (i % ST.perRow)*(ST.cw+ST.gap), y: ST.sy + Math.floor(i/ST.perRow)*(ST.ch+ST.gap), w:ST.cw, h:ST.ch };
}
function slotRect(i) { return { x: ST.slx + i*(ST.slw+ST.gap), y: ST.sly, w:ST.slw, h:ST.slh }; }

function toggleSkillTree() {
    skillTreeOpen = !skillTreeOpen;
    if (!skillTreeOpen) selectedId = null;
}

function handleSkillTreeClick(mx, my) {
    if (!skillTreeOpen) return;
    SKILLS.forEach((sk, i) => {
        const r = skillRect(i);
        if (mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h && isUnlocked(sk))
            selectedId = selectedId === sk.id ? null : sk.id;
    });
    SLOT_LABELS.forEach((_, i) => {
        const r = slotRect(i);
        if (mx >= r.x && mx <= r.x+r.w && my >= r.y && my <= r.y+r.h) {
            if (selectedId) { equippedSkills[i] = selectedId; slotCDs[i] = 0; selectedId = null; }
            else { equippedSkills[i] = null; slotCDs[i] = 0; }
        }
    });
}

function drawSkillTree() {
    if (!skillTreeOpen) return;

    // backdrop
    ctx.fillStyle = 'rgba(4,1,18,0.94)'; ctx.fillRect(ST.ox, ST.oy, ST.ow, ST.oh);
    ctx.strokeStyle = '#8844cc'; ctx.lineWidth = 2; ctx.strokeRect(ST.ox, ST.oy, ST.ow, ST.oh);

    // title
    ctx.fillStyle = '#cc88ff'; ctx.font = 'bold 22px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('技能树', ST.ox + ST.ow/2, ST.oy + 36);

    // skills section label
    ctx.fillStyle = '#998ab0'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('可用技能  (点击卡片选择)', ST.sx, ST.sy - 10);

    // skill cards
    SKILLS.forEach((sk, i) => {
        const r = skillRect(i);
        const unlocked = isUnlocked(sk);
        const sel = selectedId === sk.id;
        const slotIdx = equippedSkills.indexOf(sk.id);
        const equipped = slotIdx !== -1;

        ctx.fillStyle = sel ? `rgba(${hexRgb(sk.color)},0.28)` : unlocked ? 'rgba(28,14,48,0.95)' : 'rgba(12,6,22,0.95)';
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.strokeStyle = sel ? sk.color : unlocked ? (equipped ? sk.color+'99' : '#443366') : '#221833';
        ctx.lineWidth = sel ? 2.5 : 1.5;
        ctx.strokeRect(r.x, r.y, r.w, r.h);

        ctx.globalAlpha = unlocked ? 1 : 0.3;
        ctx.font = '20px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(sk.icon, r.x+6, r.y+26);
        ctx.fillStyle = unlocked ? sk.color : '#554466'; ctx.font = 'bold 11px sans-serif';
        ctx.fillText(sk.name, r.x+32, r.y+20);
        ctx.fillStyle = unlocked ? '#bbb' : '#443355'; ctx.font = '9px sans-serif';
        ctx.fillText(sk.desc, r.x+32, r.y+32);
        ctx.fillStyle = unlocked ? '#7799bb' : '#332244'; ctx.font = '9px sans-serif';
        ctx.fillText(`MP:${sk.mpCost}  CD:${(sk.maxCd/60).toFixed(1)}s`, r.x+6, r.y+58);

        if (!unlocked) {
            ctx.fillStyle = '#776688'; ctx.font = '9px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(`🔒 第${sk.unlockWave}波`, r.x+r.w-5, r.y+58);
        }
        if (equipped && unlocked) {
            ctx.fillStyle = sk.color; ctx.font = 'bold 9px sans-serif'; ctx.textAlign = 'right';
            ctx.fillText(`[${SLOT_LABELS[slotIdx]}]`, r.x+r.w-5, r.y+13);
        }
        ctx.globalAlpha = 1;
    });

    // divider
    ctx.strokeStyle = 'rgba(100,50,160,0.35)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(ST.ox+20, ST.sly-14); ctx.lineTo(ST.ox+ST.ow-20, ST.sly-14); ctx.stroke();

    // slots section label
    ctx.fillStyle = '#998ab0'; ctx.font = '12px sans-serif'; ctx.textAlign = 'left';
    ctx.fillText('装备槽位  (选择技能后点击槽位装备，再次点击卸下)', ST.slx, ST.sly-2);

    // slot boxes
    SLOT_LABELS.forEach((lbl, i) => {
        const r = slotRect(i);
        const sk = getSkill(equippedSkills[i]);
        ctx.fillStyle = sk ? `rgba(${hexRgb(sk.color)},0.1)` : 'rgba(25,12,44,0.8)';
        ctx.fillRect(r.x, r.y, r.w, r.h);
        ctx.strokeStyle = sk ? sk.color : '#443366'; ctx.lineWidth = 2;
        ctx.strokeRect(r.x, r.y, r.w, r.h);
        ctx.fillStyle = '#fff'; ctx.font = 'bold 15px sans-serif'; ctx.textAlign = 'left';
        ctx.fillText(`[${lbl}]`, r.x+8, r.y+20);
        if (sk) {
            ctx.font = '20px sans-serif'; ctx.fillText(sk.icon, r.x+8, r.y+50);
            ctx.fillStyle = sk.color; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText(sk.name, r.x+36, r.y+42);
            ctx.fillStyle = '#aaa'; ctx.font = '9px sans-serif';
            ctx.fillText(`MP:${sk.mpCost}`, r.x+36, r.y+56);
        } else {
            ctx.fillStyle = '#443366'; ctx.font = '12px sans-serif'; ctx.textAlign = 'center';
            ctx.fillText('空', r.x+r.w/2, r.y+r.h/2+5);
        }
    });

    // bottom hints
    ctx.textAlign = 'center'; ctx.font = '12px sans-serif';
    if (selectedId) {
        const sk = getSkill(selectedId);
        ctx.fillStyle = '#fff';
        ctx.fillText(`已选「${sk.name}」→ 点击槽位装备`, ST.ox+ST.ow/2, ST.oy+ST.oh-28);
    }
    ctx.fillStyle = 'rgba(160,120,200,0.65)';
    ctx.fillText('Tab 关闭技能树', ST.ox+ST.ow/2, ST.oy+ST.oh-10);
}

// ---- Player ----
const player = {
    x:100, y:GY, w:36, h:60, vx:0, vy:0,
    hp:100, maxHp:100, mp:100, maxMp:100,
    speed:5, facing:1, onGround:false, state:'idle',
    atkTimer:0, atkDur:18, atkCD:0,
    invTimer:0, combo:0, comboTimer:0, walkFrame:0, berserkTimer:0,

    hitBox() { return {x:this.facing>0?this.x+this.w:this.x-75, y:this.y-this.h+5, w:75, h:this.h-10}; },

    doAttack() {
        if (this.atkCD>0 || this.state==='attack' || this.state==='skill') return;
        this.state='attack'; this.atkTimer=this.atkDur; this.atkCD=25;
        const hb = this.hitBox(); let hit = false;
        enemies.forEach(e => {
            if (e.dead) return;
            if (rectsOverlap(hb, {x:e.x,y:e.y-e.h,w:e.w,h:e.h})) {
                let d = Math.floor(rand(20,35));
                if (this.berserkTimer > 0) d = Math.floor(d * 1.8);
                e.takeDamage(d); addSpark(e.x+e.w/2, e.y-e.h/2);
                addNum(e.x+e.w/2, e.y-e.h-10, d, this.berserkTimer>0 ? '#ff8800' : '#ffff00');
                hit = true;
            }
        });
        if (hit) { this.combo++; this.comboTimer=150; this.mp=Math.min(this.maxMp,this.mp+3); }
    },

    doSlotSkill(i) {
        if (this.state==='skill') return;
        const sk = getSkill(equippedSkills[i]); if (!sk) return;
        if (slotCDs[i]>0 || this.mp<sk.mpCost) return;
        this.state='skill'; this.atkTimer=25; slotCDs[i]=sk.maxCd; this.mp-=sk.mpCost;
        sk.execute(this);
    },

    takeDamage(d) {
        if (this.invTimer>0) return;
        this.hp=Math.max(0,this.hp-d); this.invTimer=80;
        addSpark(this.x+this.w/2, this.y-this.h/2, 5);
        if (this.hp<=0) gameState='over';
    },

    update() {
        if (gameState!=='play' || skillTreeOpen) return;
        this.vx=0;
        const free = this.state!=='attack' && this.state!=='skill';
        if (free) {
            if (keys['KeyA']||keys['ArrowLeft'])  { this.vx=-this.speed; this.facing=-1; }
            if (keys['KeyD']||keys['ArrowRight']) { this.vx=this.speed;  this.facing=1; }
        }
        if (keys['KeyK'] && this.onGround) { this.vy=-15; this.onGround=false; keys['KeyK']=false; }
        if (keys['KeyJ']) { keys['KeyJ']=false; this.doAttack(); }
        SLOT_KEYS.forEach((k,i) => { if (keys[k]) { keys[k]=false; this.doSlotSkill(i); } });

        this.vy+=0.75; this.x+=this.vx; this.y+=this.vy;
        if (this.y>=GY) { this.y=GY; this.vy=0; this.onGround=true; }
        this.x=Math.max(0,Math.min(W-this.w,this.x));

        if (this.state==='attack'||this.state==='skill') { if(--this.atkTimer<=0) this.state='idle'; }
        else if (!this.onGround) this.state='jump';
        else if (this.vx!==0) { this.state='walk'; this.walkFrame++; }
        else this.state='idle';

        if (this.atkCD>0) this.atkCD--;
        slotCDs = slotCDs.map(cd => cd>0?cd-1:0);
        if (this.invTimer>0) this.invTimer--;
        if (this.berserkTimer>0) this.berserkTimer--;
        if (this.mp<this.maxMp) this.mp=Math.min(this.maxMp,this.mp+0.08);
        if (this.comboTimer>0) this.comboTimer--; else this.combo=0;
    },

    draw() {
        ctx.save();
        if (this.invTimer>0 && Math.floor(this.invTimer/5)%2) ctx.globalAlpha=0.35;
        if (this.berserkTimer>0) { ctx.shadowColor='#ff6600'; ctx.shadowBlur=18; }
        const cx=this.x+this.w/2;
        ctx.translate(cx,this.y); ctx.scale(this.facing,1);

        ctx.fillStyle='rgba(0,0,0,0.3)'; ctx.beginPath(); ctx.ellipse(0,1,18,5,0,0,Math.PI*2); ctx.fill();

        const ls = this.state==='walk' ? Math.sin(this.walkFrame*0.25)*8 : 0;
        ctx.fillStyle='#1a3a7a';
        ctx.save(); ctx.translate(-8,-28); ctx.rotate(ls*0.03);  ctx.fillRect(-5,0,11,28); ctx.restore();
        ctx.save(); ctx.translate(8,-28);  ctx.rotate(-ls*0.03); ctx.fillRect(-5,0,11,28); ctx.restore();
        ctx.fillStyle='#223366'; ctx.fillRect(-18,-8,14,8); ctx.fillRect(4,-8,14,8);

        ctx.fillStyle = this.berserkTimer>0 ? '#cc4400' : '#2266cc'; ctx.fillRect(-16,-58,32,32);
        ctx.fillStyle = this.berserkTimer>0 ? '#ff6600' : '#3388ff'; ctx.fillRect(-12,-56,24,12);
        ctx.fillStyle='#4499ff'; ctx.fillRect(-22,-62,13,11); ctx.fillRect(9,-62,13,11);

        ctx.fillStyle='#f5c5a0'; ctx.beginPath(); ctx.arc(0,-68,13,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#994400'; ctx.beginPath(); ctx.arc(0,-76,13,Math.PI,0); ctx.fill(); ctx.fillRect(-13,-76,26,10);
        ctx.fillStyle='#111'; ctx.fillRect(-9,-71,5,4); ctx.fillRect(4,-71,5,4);
        ctx.fillStyle='#fff'; ctx.fillRect(-8,-72,2,2); ctx.fillRect(5,-72,2,2);

        const inAtk = this.state==='attack'||this.state==='skill';
        ctx.save(); ctx.translate(14,-48);
        if (inAtk) {
            ctx.rotate(-0.8 + (1-this.atkTimer/25)*2.2);
            ctx.shadowColor = this.berserkTimer>0 ? '#ff6600' : '#00aaff'; ctx.shadowBlur=18;
        } else { ctx.rotate(0.2); }
        ctx.fillStyle = inAtk ? (this.berserkTimer>0?'#ffaa44':'#88ddff') : '#c8ddf8';
        ctx.fillRect(-3,-55,9,55); ctx.fillStyle='#fff'; ctx.fillRect(-1,-55,3,55);
        ctx.fillStyle='#cc8800'; ctx.fillRect(-10,-3,23,8);
        ctx.fillStyle='#663300'; ctx.fillRect(-1,5,6,18);
        ctx.restore(); ctx.restore();
    }
};

// ---- Enemy ----
class Enemy {
    constructor(x, type='slime') {
        this.type=type; this.x=x; this.y=GY;
        this.dead=false; this.deathTimer=0; this.hitTimer=0; this.atkCD=0; this.walkFrame=0;
        if (type==='slime') { this.w=38;this.h=42;this.hp=this.maxHp=50+wave*15;this.speed=1.2+wave*0.15;this.dmg=8; }
        else                { this.w=50;this.h=65;this.hp=this.maxHp=130+wave*30;this.speed=0.9+wave*0.1;this.dmg=18; }
    }
    get facing() { return player.x+player.w/2 > this.x+this.w/2 ? 1 : -1; }
    takeDamage(d) {
        this.hp-=d; this.hitTimer=12;
        if (this.hp<=0 && !this.dead) {
            this.dead=true; this.deathTimer=35;
            score += this.type==='orc' ? 300 : 100;
            player.mp = Math.min(player.maxMp, player.mp + (this.type==='orc'?15:8));
        }
    }
    update() {
        if (skillTreeOpen) return;
        if (this.dead) { if(this.deathTimer>0) this.deathTimer--; return; }
        if (this.hitTimer>0) this.hitTimer--;
        if (this.atkCD>0) this.atkCD--;
        const dx=(player.x+player.w/2)-(this.x+this.w/2), dist=Math.abs(dx);
        const range=this.type==='orc'?62:48;
        if (dist>range) { this.x+=Math.sign(dx)*this.speed; this.walkFrame++; }
        else if (this.atkCD<=0) { player.takeDamage(this.dmg); this.atkCD=90; }
        this.x=Math.max(-this.w,Math.min(W,this.x));
    }
    draw() {
        if (this.dead&&this.deathTimer<=0) return;
        ctx.save();
        ctx.globalAlpha = this.dead ? this.deathTimer/35 : 1;
        if (this.hitTimer>0) ctx.filter='brightness(2.5) saturate(0)';
        ctx.translate(this.x+this.w/2, this.y); ctx.scale(this.facing,1);
        if (this.type==='slime') {
            const bob=Math.sin(Date.now()*0.004)*3;
            ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.ellipse(0,2,18,5,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#33bb33'; ctx.beginPath(); ctx.ellipse(0,-20+bob,20,22,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#77ee77'; ctx.beginPath(); ctx.ellipse(-5,-30+bob,9,7,-0.3,0,Math.PI*2); ctx.fill();
            ctx.filter='none';
            ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(7,-22+bob,4,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-7,-22+bob,4,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(8,-23+bob,1.5,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-6,-23+bob,1.5,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#fff'; ctx.fillRect(-6,-12+bob,5,4); ctx.fillRect(1,-12+bob,5,4);
        } else {
            const ls=Math.sin(this.walkFrame*0.2)*6;
            ctx.fillStyle='rgba(0,0,0,0.28)'; ctx.beginPath(); ctx.ellipse(0,2,22,6,0,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#663311';
            ctx.save(); ctx.translate(-10,-30); ctx.rotate(ls*0.025);  ctx.fillRect(-6,0,12,30); ctx.restore();
            ctx.save(); ctx.translate(10,-30);  ctx.rotate(-ls*0.025); ctx.fillRect(-6,0,12,30); ctx.restore();
            ctx.fillStyle='#994422'; ctx.fillRect(-22,-65,44,38);
            ctx.fillStyle='#bb5533'; ctx.fillRect(-16,-62,32,14);
            ctx.fillStyle='#bb6633'; ctx.beginPath(); ctx.arc(0,-75,22,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#886600';
            ctx.beginPath(); ctx.moveTo(-14,-90); ctx.lineTo(-8,-108); ctx.lineTo(-3,-88); ctx.closePath(); ctx.fill();
            ctx.beginPath(); ctx.moveTo(14,-90);  ctx.lineTo(8,-108);  ctx.lineTo(3,-88);  ctx.closePath(); ctx.fill();
            ctx.filter='none';
            ctx.fillStyle='#ff1100'; ctx.beginPath(); ctx.arc(9,-77,6,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-9,-77,6,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#ff6600'; ctx.beginPath(); ctx.arc(9,-77,3,0,Math.PI*2); ctx.fill(); ctx.beginPath(); ctx.arc(-9,-77,3,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#664400'; ctx.fillRect(18,-62,9,50);
            ctx.fillStyle='#553300'; ctx.beginPath(); ctx.ellipse(22,-65,16,12,0.2,0,Math.PI*2); ctx.fill();
            ctx.fillStyle='#888';
            for(let i=0;i<4;i++){const a=(i/4)*Math.PI*2+0.2;ctx.beginPath();ctx.arc(22+Math.cos(a)*10,-65+Math.sin(a)*6,2.5,0,Math.PI*2);ctx.fill();}
        }
        ctx.scale(this.facing,1);
        const bw=this.w+10;
        ctx.fillStyle='rgba(0,0,0,0.6)'; ctx.fillRect(-bw/2-1,-this.h-17,bw+2,9);
        ctx.fillStyle='#cc0000';         ctx.fillRect(-bw/2,   -this.h-16,bw*(this.hp/this.maxHp),7);
        ctx.strokeStyle='#ff4444'; ctx.lineWidth=1; ctx.strokeRect(-bw/2,-this.h-16,bw,7);
        ctx.restore();
    }
}

// ---- Background ----
function drawBackground() {
    const flicker=Math.sin(Date.now()*0.008)*0.15;
    const bg=ctx.createLinearGradient(0,0,0,GY); bg.addColorStop(0,'#080316'); bg.addColorStop(1,'#150830');
    ctx.fillStyle=bg; ctx.fillRect(0,0,W,GY);
    for(let i=0;i<6;i++){
        const cx=70+i*136;
        ctx.fillStyle='rgba(55,28,88,0.5)'; ctx.fillRect(cx-25,0,50,GY);
        ctx.fillStyle='rgba(75,38,110,0.4)'; ctx.fillRect(cx-20,0,6,GY); ctx.fillRect(cx+14,0,6,GY);
    }
    ctx.strokeStyle='rgba(100,55,140,0.35)'; ctx.lineWidth=2;
    for(let i=0;i<5;i++){const x1=70+i*136,x2=x1+136;ctx.beginPath();ctx.moveTo(x1,0);ctx.quadraticCurveTo((x1+x2)/2,55,x2,0);ctx.stroke();}
    for(let i=0;i<4;i++){
        const tx=100+i*200,fi=0.27+flicker*0.38;
        const grd=ctx.createRadialGradient(tx,52,4,tx,52,95);
        grd.addColorStop(0,`rgba(255,140,0,${fi})`); grd.addColorStop(1,'rgba(255,80,0,0)');
        ctx.fillStyle=grd; ctx.fillRect(tx-95,0,190,190);
        ctx.fillStyle='#554422'; ctx.fillRect(tx-5,50,10,22); ctx.fillRect(tx-10,46,20,6);
        ctx.fillStyle='#ff4400'; ctx.beginPath(); ctx.ellipse(tx,44,7,10,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ff9900'; ctx.beginPath(); ctx.ellipse(tx,42,4,7,0,0,Math.PI*2); ctx.fill();
        ctx.fillStyle='#ffcc00'; ctx.beginPath(); ctx.ellipse(tx,40,2,4,0,0,Math.PI*2); ctx.fill();
    }
    const gg=ctx.createLinearGradient(0,GY,0,H); gg.addColorStop(0,'#3d2055'); gg.addColorStop(1,'#1e0e2e');
    ctx.fillStyle=gg; ctx.fillRect(0,GY,W,H-GY);
    ctx.fillStyle='#5a3080'; ctx.fillRect(0,GY,W,4); ctx.fillStyle='#7a50a0'; ctx.fillRect(0,GY,W,2);
    ctx.strokeStyle='rgba(100,60,140,0.22)'; ctx.lineWidth=1;
    for(let x=0;x<W;x+=80){ctx.beginPath();ctx.moveTo(x,GY+4);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=GY+4;y<H;y+=40){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
}

// ---- HUD ----
function drawHUD() {
    // HP
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(10,10,206,22);
    ctx.fillStyle=player.hp>50?'#dd2222':player.hp>25?'#ff8800':'#ff2200';
    ctx.fillRect(12,12,202*(player.hp/player.maxHp),18);
    ctx.strokeStyle='#ff4444'; ctx.lineWidth=1.5; ctx.strokeRect(10,10,206,22);
    ctx.fillStyle='#fff'; ctx.font='bold 12px sans-serif'; ctx.textAlign='left';
    ctx.fillText(`HP  ${player.hp} / ${player.maxHp}`, 16, 25);
    // MP
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(10,36,206,16);
    ctx.fillStyle='#2255dd'; ctx.fillRect(12,38,202*(player.mp/player.maxMp),12);
    ctx.strokeStyle='#4488ff'; ctx.lineWidth=1; ctx.strokeRect(10,36,206,16);
    ctx.fillStyle='#aaccff'; ctx.font='11px sans-serif';
    ctx.fillText(`MP  ${Math.floor(player.mp)} / ${player.maxMp}`, 16, 49);
    // Berserk
    if (player.berserkTimer>0) {
        ctx.fillStyle='#ff6600'; ctx.font='bold 11px sans-serif';
        ctx.fillText(`💢狂暴 ${Math.ceil(player.berserkTimer/60)}s`, 16, 64);
    }
    // Score
    ctx.fillStyle='#ffdd00'; ctx.font='bold 20px sans-serif'; ctx.textAlign='right';
    ctx.fillText(score.toLocaleString(), W-12, 30);
    ctx.fillStyle='#aaa'; ctx.font='11px sans-serif'; ctx.fillText('SCORE', W-12, 44);
    // Wave
    ctx.fillStyle='#ff8800'; ctx.font='bold 15px sans-serif'; ctx.textAlign='center';
    ctx.fillText(`Wave  ${wave}`, W/2, 25);
    ctx.fillStyle='#ccc'; ctx.font='12px sans-serif';
    ctx.fillText(`残存: ${enemies.filter(e=>!e.dead).length}`, W/2, 42);
    // Combo
    if (player.combo>1 && player.comboTimer>0) {
        const ca=Math.min(1,player.comboTimer/30);
        ctx.save(); ctx.globalAlpha=ca;
        ctx.fillStyle=`hsl(${40+player.combo*4},100%,58%)`;
        ctx.font=`bold ${Math.min(28,14+player.combo*2)}px sans-serif`; ctx.textAlign='center';
        ctx.strokeStyle='#000'; ctx.lineWidth=3;
        ctx.strokeText(`${player.combo} COMBO!`,W/2,66); ctx.fillText(`${player.combo} COMBO!`,W/2,66);
        ctx.restore();
    }
    // Skill slots (bottom)
    const sw=52, sh=52, sg=6;
    SLOT_LABELS.forEach((lbl,i) => {
        const sx=10+i*(sw+sg), sy=H-sh-10;
        const sk = getSkill(equippedSkills[i]);
        ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(sx,sy,sw,sh);
        ctx.strokeStyle=sk?sk.color:'#443366'; ctx.lineWidth=1.5; ctx.strokeRect(sx,sy,sw,sh);
        ctx.fillStyle='#fff'; ctx.font='bold 9px sans-serif'; ctx.textAlign='left'; ctx.fillText(lbl,sx+3,sy+11);
        if (sk) {
            ctx.font='18px sans-serif'; ctx.textAlign='center'; ctx.fillText(sk.icon,sx+sw/2,sy+34);
            ctx.fillStyle=sk.color; ctx.font='bold 8px sans-serif'; ctx.fillText(sk.name,sx+sw/2,sy+46);
            if (slotCDs[i]>0) {
                ctx.fillStyle='rgba(0,0,0,0.62)'; ctx.fillRect(sx,sy,sw,sh*(slotCDs[i]/sk.maxCd));
                ctx.fillStyle='#ffdd00'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
                ctx.fillText(Math.ceil(slotCDs[i]/60)+'s', sx+sw/2, sy+sh-10);
            } else if (player.mp<sk.mpCost) {
                ctx.fillStyle='rgba(0,0,60,0.55)'; ctx.fillRect(sx,sy,sw,sh);
                ctx.fillStyle='#88aaff'; ctx.font='8px sans-serif'; ctx.textAlign='center'; ctx.fillText('MP不足',sx+sw/2,sy+sh-10);
            }
        } else {
            ctx.fillStyle='#443366'; ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.fillText('空',sx+sw/2,sy+sh/2+4);
        }
    });
    // hint
    ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.font='11px sans-serif'; ctx.textAlign='right';
    ctx.fillText('Tab 技能树  AD移动  K跳跃  J攻击  UIOL技能', W-10, H-10);
    // skill tree indicator
    if (skillTreeOpen) {
        ctx.fillStyle='rgba(180,100,255,0.9)'; ctx.font='bold 13px sans-serif'; ctx.textAlign='center';
        ctx.fillText('【技能树已打开 — Tab关闭】', W/2, H-28);
    }
}

// ---- Wave ----
function spawnWave() {
    const total=3+wave*2, orcChance=Math.min(0.5,0.1+wave*0.08);
    for(let i=0;i<total;i++){
        setTimeout(()=>{
            if(gameState!=='play') return;
            const side=Math.random()<0.5?-45:W+5;
            enemies.push(new Enemy(side, Math.random()<orcChance?'orc':'slime'));
        }, i*700);
    }
}
function checkWaveEnd() {
    if (!enemies.length) return;
    if (!enemies.some(e=>!e.dead) && !enemies.some(e=>e.dead&&e.deathTimer>0)) {
        enemies=[]; wave++;
        if (wave > maxWave) maxWave = wave;
        setTimeout(spawnWave, 1500);
    }
}

// ---- Game Over ----
function drawGameOver() {
    ctx.fillStyle='rgba(0,0,0,0.72)'; ctx.fillRect(0,0,W,H);
    ctx.save(); ctx.textAlign='center';
    ctx.fillStyle='#ff2200'; ctx.font='bold 52px sans-serif';
    ctx.strokeStyle='#000'; ctx.lineWidth=4;
    ctx.strokeText('GAME OVER',W/2,H/2-50); ctx.fillText('GAME OVER',W/2,H/2-50);
    ctx.fillStyle='#ffdd00'; ctx.font='bold 26px sans-serif';
    ctx.fillText(`最终得分: ${score.toLocaleString()}`, W/2, H/2+5);
    ctx.fillStyle='#ff8800'; ctx.font='18px sans-serif';
    ctx.fillText(`到达第 ${wave} 波`, W/2, H/2+38);
    ctx.fillStyle='#fff'; ctx.font='16px sans-serif';
    ctx.fillText('按  R  重新开始', W/2, H/2+72);
    ctx.restore();
    if (keys['KeyR']) { keys['KeyR']=false; resetGame(); }
}

function resetGame() {
    score=0; wave=1; gameState='play'; enemies=[]; projectiles=[]; effects.length=0;
    slotCDs=[0,0,0,0];
    Object.assign(player, {x:100,y:GY,vx:0,vy:0,hp:100,mp:100,
        state:'idle',atkCD:0,invTimer:0,combo:0,comboTimer:0,berserkTimer:0});
    spawnWave();
}

// ---- Main Loop ----
function loop() {
    ctx.clearRect(0,0,W,H);
    drawBackground();
    if (gameState==='play' && !skillTreeOpen) {
        player.update();
        enemies.forEach(e=>e.update());
        enemies=enemies.filter(e=>!e.dead||e.deathTimer>0);
        projectiles.forEach(p=>p.update());
        projectiles=projectiles.filter(p=>!p.dead);
        updateEffects();
        checkWaveEnd();
    }
    projectiles.forEach(p=>p.draw());
    enemies.forEach(e=>e.draw());
    player.draw();
    drawEffects();
    drawHUD();
    if (gameState==='over') drawGameOver();
    drawSkillTree();
    requestAnimationFrame(loop);
}

spawnWave();
loop();
</script>
