<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>背景图嵌入Canvas</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; }
        canvas { display: block; }
        .content-box {
            position: absolute; /* 使用绝对定位脱离文档流 */
            top: 50px; left: 50px;
            background: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div class="content-box">
        <h1>Index</h1>
        <p>背景图已嵌入 Canvas 内部</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/yj.png';

        // 粒子数据
        const particles = Array.from({ length: 100 }, () => ({
            x: Math.random() * window.innerWidth,
            y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5
        }));

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function draw() {
            // 1. 先绘制背景图 (这会覆盖掉上一帧)
            if (img.complete) {
                ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
            } else {
                ctx.fillStyle = '#000'; // 图片加载前显示黑色
                ctx.fillRect(0, 0, canvas.width, canvas.height);
            }

            // 2. 绘制粒子
            ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        img.onload = draw; // 图片加载完成后开始动画
    </script>
</body>
</html>
