<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBase网页嵌入</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        
        .content-box { position: absolute; top: 50px; left: 50px; background: rgba(255, 255, 255, 0.7); padding: 20px; border-radius: 15px; z-index: 10; }
        
        /* 播放器 UI */
        #music-container { position: absolute; top: 20px; right: 20px; z-index: 20; text-align: right; }
        #music-list { background: rgba(255, 255, 255, 0.9); padding: 10px; border-radius: 10px; margin-top: 5px; max-height: 200px; overflow-y: auto; display: none; width: 200px; }
        .song-item { cursor: pointer; padding: 5px; border-bottom: 1px solid #ddd; font-size: 12px; }
        .song-item:hover { color: #4a90e2; }
    </style>
</head>
<body>

    <div id="music-container">
        <button id="toggle-list-btn" onclick="toggleList()">🎵 音乐列表</button>
        <button id="play-pause-btn" onclick="togglePlay()">⏸ 暂停</button>
        <button onclick="document.getElementById('music-upload').click()">+ 上传</button>
        <input type="file" id="music-upload" accept="audio/*" multiple style="display:none">
        
        <div id="music-list"></div>
    </div>

    <canvas id="canvas"></canvas>
    <div class="content-box">
        <h1>GBase网页嵌入</h1>
        <p>canvas</p>
    </div>

    <script>
        let playlist = [
            { name: "星座书上", url: "https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/xzss.mp3" }
        ];
        
        const audio = new Audio(playlist[0].url);
        audio.loop = true;
        const listEl = document.getElementById('music-list');
        const playPauseBtn = document.getElementById('play-pause-btn');

        // --- 核心功能函数 ---
        function toggleList() {
            listEl.style.display = (listEl.style.display === 'block') ? 'none' : 'block';
        }

        function togglePlay() {
            if (audio.paused) {
                audio.play();
                playPauseBtn.innerText = "⏸ 暂停";
            } else {
                audio.pause();
                playPauseBtn.innerText = "▶ 播放";
            }
        }

        // 点击空白处关闭列表
        window.addEventListener('click', (e) => {
            if (!document.getElementById('music-container').contains(e.target)) {
                listEl.style.display = 'none';
            }
        });

        // 第一次交互自动播放
        window.addEventListener('click', function start() {
            audio.play().then(() => {
                window.removeEventListener('click', start);
            }).catch(e => console.log("等待用户交互"));
        }, { once: true });

        // 渲染列表
        function renderList() {
            listEl.innerHTML = "";
            playlist.forEach((song) => {
                const div = document.createElement('div');
                div.className = 'song-item';
                div.innerText = song.name;
                div.onclick = () => { audio.src = song.url; audio.play(); playPauseBtn.innerText = "⏸ 暂停"; };
                listEl.appendChild(div);
            });
        }

        document.getElementById('music-upload').onchange = (e) => {
            Array.from(e.target.files).forEach(file => {
                playlist.push({ name: file.name, url: URL.createObjectURL(file) });
            });
            renderList();
        };

        renderList();

        // --- Canvas 逻辑 ---
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/yj.png';

        const particles = Array.from({ length: 100 }, () => ({
            x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
        }));

        function drawBackground() {
            const canvasAspect = canvas.width / canvas.height;
            const imgAspect = img.width / img.height;
            let drawWidth, drawHeight, offsetX, offsetY;
            if (canvasAspect > imgAspect) {
                drawWidth = canvas.width; drawHeight = canvas.width / imgAspect;
                offsetX = 0; offsetY = -(drawHeight - canvas.height) / 2;
            } else {
                drawWidth = canvas.height * imgAspect; drawHeight = canvas.height;
                offsetX = -(drawWidth - canvas.width) / 2; offsetY = 0;
            }
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete) drawBackground();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        img.onload = animate;
    </script>

    <script>
        window.gptbaseConfig = {
            chatbotId: '462e07e3-2eb4-4d32-81d0-6e616b272704',
            baseUrl: 'https://admin.gbase.ai',
            apiBaseUrl: 'https://admin.gbase.ai/api',
        };
    </script>
    <script src="https://gbase.ai/plugin/plugin.js" id="462e07e3-2eb4-4d32-81d0-6e616b272704" defer></script>
</body>
</html>
