<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBase网页嵌入</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'PingFang SC', sans-serif; color: #fff; }
        canvas { display: block; }

        /* 统一的毛玻璃卡片样式 */
        .glass-card {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            padding: 20px;
            color: white;
        }

        /* 右侧格子容器 */
        .grid-container {
            position: absolute;
            top: 150px; right: 50px;
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 15px;
            z-index: 10;
        }

        .grid-item {
            height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.3s, background 0.3s;
        }

        .grid-item:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-5px);
        }

        /* 音乐控制区域位置调整 */
        #music-container { position: absolute; top: 20px; right: 20px; z-index: 20; }
    </style>
</head>
<body>

    <div id="music-container">
        <button onclick="document.getElementById('music-list').style.display='block'">🎵 音乐</button>
        <div id="music-list" style="display:none; background:#333; position:absolute; right:0; padding:10px;">
            <div class="song-item" onclick="audio.src='https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/xzss.mp3'; audio.play();">星座书上</div>
        </div>
    </div>

    <div class="grid-container">
        <div class="glass-card grid-item" onclick="window.open('#')"><span>📖</span><span>博客</span></div>
        <div class="glass-card grid-item" onclick="window.open('#')"><span>☁️</span><span>网盘</span></div>
        <div class="glass-card grid-item" onclick="window.open('#')"><span>🎵</span><span>音乐</span></div>
        <div class="glass-card grid-item" onclick="window.open('#')"><span>🚀</span><span>起始页</span></div>
        <div class="glass-card grid-item" onclick="window.open('#')"><span>🔗</span><span>网址集</span></div>
        <div class="glass-card grid-item" onclick="window.open('#')"><span>🔥</span><span>热榜</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/yj.png';

        const particles = Array.from({ length: 100 }, () => ({
            x: Math.random() * window.innerWidth, y: Math.random() * window.innerHeight,
            vx: (Math.random() - 0.5) * 0.5, vy: (Math.random() - 0.5) * 0.5
        }));

        function drawBackground() {
            const canvasAspect = canvas.width / canvas.height;
            const imgAspect = img.width / img.height;
            let drawWidth, drawHeight, offsetX, offsetY;
            if (canvasAspect > imgAspect) {
                drawWidth = canvas.width; drawHeight = canvas.width / imgAspect;
                offsetX = 0; offsetY = -(drawHeight - canvas.height) / 2;
            } else {
                drawWidth = canvas.height * imgAspect; drawHeight = canvas.height;
                offsetX = -(drawWidth - canvas.width) / 2; offsetY = 0;
            }
            ctx.drawImage(img, offsetX, offsetY, drawWidth, drawHeight);
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete) drawBackground();
            ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        img.onload = animate;
    </script>

    <script>
        window.gptbaseConfig = { chatbotId: '462e07e3-2eb4-4d32-81d0-6e616b272704', baseUrl: 'https://admin.gbase.ai', apiBaseUrl: 'https://admin.gbase.ai/api' };
    </script>
    <script src="https://gbase.ai/plugin/plugin.js" id="462e07e3-2eb4-4d32-81d0-6e616b272704" defer></script>
</body>
</html>
