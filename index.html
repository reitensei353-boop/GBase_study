<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBase网页嵌入</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'PingFang SC', sans-serif; color: #fff; }
        canvas { display: block; }

        .glass-card { background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.2); border-radius: 15px; padding: 20px; color: white; }

        /* 响应式布局：手机适配 */
        .grid-container { 
            position: absolute; top: 150px; right: 50px; display: grid; 
            grid-template-columns: repeat(3, 120px); gap: 15px; z-index: 10; 
        }
        @media (max-width: 768px) {
            .grid-container { right: auto; left: 50%; transform: translateX(-50%); grid-template-columns: repeat(2, 120px); top: 100px; }
            .panel { left: 5% !important; width: 90% !important; top: 250px !important; }
        }

        .grid-item { height: 100px; display: flex; flex-direction: column; justify-content: center; align-items: center; cursor: pointer; transition: 0.3s; }
        .grid-item:hover { background: rgba(255, 255, 255, 0.3); transform: translateY(-5px); }

        .panel { position: absolute; top: 150px; left: 50px; width: 250px; height: 350px; z-index: 20; display: none; overflow-y: auto; }
        .item { cursor: pointer; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); font-size: 14px; }
        .item:hover { color: #4a90e2; background: rgba(255,255,255,0.1); }
    </style>
</head>
<body>

    <div id="music-panel" class="panel glass-card">
        <h3 style="margin-top:0">播放列表</h3>
        <button id="play-pause-btn" onclick="togglePlay()">⏸ 暂停</button>
        <button onclick="document.getElementById('music-upload').click()">+ 上传</button>
        <input type="file" id="music-upload" accept="audio/*" multiple style="display:none">
        <div id="music-list"></div>
    </div>

    <div id="links-panel" class="panel glass-card">
        <h3 style="margin-top:0">网址导航</h3>
        <div class="item" onclick="window.open('https://gbase.ai/', '_blank')">🤖 GBase</div>
        <div class="item" onclick="window.open('https://www.google.com', '_blank')">🌐 Google</div>
        <div class="item" onclick="window.open('https://github.com', '_blank')">🐱 GitHub</div>
        <div class="item" onclick="window.open('https://www.bilibili.com', '_blank')">📺 Bilibili</div>
        <div class="item" onclick="window.open('https://gbase.ai/widget-page/462e07e3-2eb4-4d32-81d0-6e616b272704', '_blank')">🤖 GBase-哈基米</div>    
    </div>

    <div class="grid-container">
        <div class="glass-card grid-item"><span>📖</span><span>博客</span></div>
        <div class="glass-card grid-item"><span>☁️</span><span>网盘</span></div>
        <div class="glass-card grid-item" onclick="togglePanel('music-panel')"><span>🎵</span><span>音乐</span></div>
        <div class="glass-card grid-item"><span>🚀</span><span>起始页</span></div>
        <div class="glass-card grid-item" onclick="togglePanel('links-panel')"><span>🔗</span><span>网址集</span></div>
        <div class="glass-card grid-item"><span>🔥</span><span>热榜</span></div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        let playlist = [{ name: "星座书上", url: "https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/xzss.mp3" }];
        const audio = new Audio(playlist[0].url);
        audio.loop = true;

        function togglePanel(panelId) {
            const panels = ['music-panel', 'links-panel'];
            panels.forEach(id => {
                const p = document.getElementById(id);
                p.style.display = (id === panelId && p.style.display !== 'block') ? 'block' : 'none';
            });
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); document.getElementById('play-pause-btn').innerText = "⏸ 暂停"; }
            else { audio.pause(); document.getElementById('play-pause-btn').innerText = "▶ 播放"; }
        }

        function renderList() {
            const listEl = document.getElementById('music-list');
            listEl.innerHTML = "";
            playlist.forEach(song => {
                const div = document.createElement('div');
                div.className = 'item';
                div.innerText = song.name;
                div.onclick = () => { audio.src = song.url; audio.play(); document.getElementById('play-pause-btn').innerText = "⏸ 暂停"; };
                listEl.appendChild(div);
            });
        }
        document.getElementById('music-upload').onchange = (e) => {
            Array.from(e.target.files).forEach(file => playlist.push({ name: file.name, url: URL.createObjectURL(file) }));
            renderList();
        };
        renderList();

        window.addEventListener('click', function start() { audio.play().then(() => window.removeEventListener('click', start)).catch(e => {}); }, { once: true });

        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const img = new Image();
        img.src = 'https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/yj.png';
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (img.complete) {
                const aspect = canvas.width / canvas.height;
                const imgAspect = img.width / img.height;
                const w = aspect > imgAspect ? canvas.width : canvas.height * imgAspect;
                const h = aspect > imgAspect ? canvas.width / imgAspect : canvas.height;
                ctx.drawImage(img, (canvas.width - w) / 2, (canvas.height - h) / 2, w, h);
            }
            requestAnimationFrame(animate);
        }
        window.addEventListener('resize', () => { canvas.width = window.innerWidth; canvas.height = window.innerHeight; });
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        img.onload = animate;
    </script>
    <script src="https://gbase.ai/plugin/plugin.js" id="462e07e3-2eb4-4d32-81d0-6e616b272704" defer></script>
</body>
</html>
