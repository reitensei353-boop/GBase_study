<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GBase网页嵌入</title>
    <style>
        /* 页面整体样式：确保背景图充满全屏 */
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            text-align: center;
            background-image: url('https://raw.githubusercontent.com/reitensei353-boop/GBase_study/main/yj.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            background-color: #000; /* 作为图片的备选底色 */
        }

        /* Canvas 层：透明背景，只显示粒子 */
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none; /* 确保鼠标可以点到页面内容 */
        }

        .content-box {
            background-color: rgba(255, 255, 255, 0.7);
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
            margin-top: 50px;
        }

        h1 { color: #333; margin: 0; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="content-box">
        <h1>Index</h1>
        <p>GBase_study</p>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        const particles = Array.from({ length: 100 }, () => ({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 0.5,
            vy: (Math.random() - 0.5) * 0.5
        }));

        function draw() {
            // 清除每一帧，且不添加任何填充颜色，保持 Canvas 全透明
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // 使用半透明白色，使粒子在复杂背景上也能看清
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)'; 
            
            particles.forEach(p => {
                p.x += p.vx; 
                p.y += p.vy;
                if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
                if (p.y < 0 || p.y > canvas.height) p.vy *= -1;
                
                ctx.beginPath();
                ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
                ctx.fill();
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>

    <script>
        window.gptbaseConfig = {
            chatbotId: '462e07e3-2eb4-4d32-81d0-6e616b272704',
            baseUrl: 'https://admin.gbase.ai',
            apiBaseUrl: 'https://admin.gbase.ai/api',
        };
    </script>
    <script src="https://gbase.ai/plugin/plugin.js" id="462e07e3-2eb4-4d32-81d0-6e616b272704" defer></script>
</body>
</html>
